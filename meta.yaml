package:
  name: fremor
  version: '{{ environ.get("GIT_DESCRIBE_TAG", "develop") }}'

source:
  path: .

build:
  script: 
    - {{ PYTHON }} -m pip install . -vv
  number: 0
  noarch: python

channels:
    - conda-forge
    - noaa-gfdl

requirements:
  host:
    - python>=3.11
    - pip
    - setuptools
  run:
    - python>=3.11
    - click>=8.2
    - cmor>=3.14.2
    - netcdf4>=1.7
    - numpy>=2
    - pyyaml

test:
  requires:
    - conda-forge::pylint
    - conda-forge::pytest
    - conda-forge::pytest-cov
  source_files:
    - fremor/
  files:
    - pylintrc
  imports:
    - fremor
    - fremor._version
    - fremor.cli
    - fremor.cmor_config
    - fremor.cmor_constants
    - fremor.cmor_finder
    - fremor.cmor_helpers
    - fremor.cmor_init
    - fremor.cmor_mixer
    - fremor.cmor_yamler
  commands:
    - fremor --help
    - fremor config --help
    - fremor find --help
    - fremor init --help
    - fremor run --help
    - fremor yaml --help
    - pytest --durations=5 --log-level DEBUG fremor/

about:
  home: https://github.com/ilaflott/fremorizer
  license: Apache-2.0
  license_file: LICENSE.md
  summary: Model output rewriter (CMORizer) for FRE/FMS based models
  author: Ian Laflotte, Sergey Nikonov, Chris Blanton, and NOAA-GFDL Modeling Systems Division
