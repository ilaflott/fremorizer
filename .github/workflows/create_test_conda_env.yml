name: create_test_conda_env
on:
  push:
    branches:
      - main
  pull_request:
    branches:

# cancel running jobs if theres a newer push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  conda-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Checkout Files
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Miniforge environment from environment.yaml (Python ${{ matrix.python-version }})
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          channels: conda-forge,noaa-gfdl
          python-version: ${{ matrix.python-version }}
          conda-remove-defaults: true
          environment-file: environment.yaml
          activate-environment: fremorizer

      - name: Show installed packages
        run: |
          echo "conda info is:"
          conda info

          echo "printing installed packages"
          conda list

          echo "printing conda config just in case"
          conda config --show

      - name: Install fremorizer
        run: |
          pip install .

      - name: Run pytest
        run: |
          pytest --cov=fremorizer --cov-config=coveragerc --cov-report=xml fremorizer/tests/ -v

      - name: Upload Coverage to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Run pylint
        if: ${{ always() }}
        run: |
          pylint --rcfile pylintrc fremorizer/
